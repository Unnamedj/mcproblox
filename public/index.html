<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#07080f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RBX Executor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07080f;--surface:#0e1018;--surface-2:#151823;--surface-3:#1c2030;
  --border:rgba(255,255,255,.08);--border-2:rgba(255,255,255,.12);
  --text:#f0f4ff;--muted:#6b7280;--muted-2:#9ca3af;
  --green:#4ade80;--green-dim:rgba(74,222,128,.1);--green-glow:rgba(74,222,128,.2);
  --claude:#f97316;--claude-dim:rgba(249,115,22,.12);
  --gemini:#60a5fa;--gemini-dim:rgba(96,165,250,.12);
  --free:#a78bfa;--free-dim:rgba(167,139,250,.12);
  --danger:#f87171;--code:#86efac;
  --radius:16px;--radius-sm:10px;--radius-xs:7px;
  --tabs-h:64px;--safe-b:env(safe-area-inset-bottom,0px);--safe-t:env(safe-area-inset-top,0px);
  --shadow:0 4px 24px rgba(0,0,0,.4);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{
  font-family:'Inter',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);
  min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 70% 40% at 15% -5%,rgba(74,222,128,.07),transparent),
    radial-gradient(ellipse 50% 30% at 85% 105%,rgba(167,139,250,.05),transparent);
}

/* ── HEADER ─────────────────────── */
.header{
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;
  padding:calc(10px + var(--safe-t)) 16px 10px;
  background:rgba(8,9,15,.88);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);position:relative;z-index:10;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{
  width:34px;height:34px;border-radius:9px;flex-shrink:0;
  background:linear-gradient(135deg,var(--green),#16a34a);
  display:grid;place-items:center;font-size:16px;
  box-shadow:0 0 16px rgba(74,222,128,.3);
}
.brand-name{font-size:1rem;font-weight:700;letter-spacing:-.03em}
.brand-sub{font-size:.67rem;color:var(--muted);font-weight:500;display:block}
.conn-badge{
  display:flex;align-items:center;gap:6px;padding:5px 12px;
  border-radius:999px;background:var(--surface-2);border:1px solid var(--border);
  font-size:.72rem;font-weight:600;color:var(--muted);transition:all .3s;
}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);transition:all .3s}
.conn-badge.online{color:var(--green);border-color:rgba(74,222,128,.3);background:rgba(74,222,128,.08)}
.conn-badge.online .conn-dot{background:var(--green);box-shadow:0 0 6px var(--green);animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}

/* ── SCAN BADGE ─────────────────── */
.scan-badge{
  display:none;padding:6px 16px;font-size:.72rem;font-weight:500;
  color:var(--green);background:rgba(74,222,128,.07);
  border-bottom:1px solid rgba(74,222,128,.15);text-align:center;
}
.scan-badge.visible{display:block}

/* ── MODEL BAR ───────────────────── */
.model-bar{
  flex-shrink:0;padding:10px 16px;
  border-bottom:1px solid var(--border);background:var(--surface);
}
.provider-tabs{display:flex;gap:4px;margin-bottom:8px}
.provider-tab{
  flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  height:40px;border-radius:var(--radius-xs);
  border:1.5px solid var(--border);background:var(--surface-2);
  color:var(--muted-2);font-family:inherit;font-size:.82rem;font-weight:600;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.provider-tab:active:not(:disabled){transform:scale(.97)}
.provider-tab.active.claude{border-color:var(--claude);background:var(--claude-dim);color:#fdba74}
.provider-tab.active.gemini{border-color:var(--gemini);background:var(--gemini-dim);color:#93c5fd}
.provider-tab.active.free{border-color:var(--free);background:var(--free-dim);color:#c4b5fd}
.provider-tab.unavailable{opacity:.4;cursor:not-allowed}
.provider-dot{width:7px;height:7px;border-radius:50%}
.provider-tab.claude .provider-dot{background:var(--claude)}
.provider-tab.gemini .provider-dot{background:var(--gemini)}
.provider-tab.free .provider-dot{background:var(--free)}
.tier-options{display:flex;gap:6px}
.tier-btn{
  flex:1;position:relative;display:flex;flex-direction:column;gap:1px;
  padding:8px 10px;min-height:46px;border-radius:var(--radius-xs);
  border:1.5px solid var(--border);background:var(--bg);
  color:var(--text);font-family:inherit;text-align:left;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
.tier-btn:active{transform:scale(.97)}
.tier-badge{
  position:absolute;top:6px;right:6px;font-size:.58rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.04em;padding:2px 5px;
  border-radius:4px;background:var(--surface-3);color:var(--muted);
}
.tier-name{font-size:.82rem;font-weight:700}
.tier-desc{font-size:.65rem;color:var(--muted)}
.model-bar[data-provider=claude] .tier-btn.selected{border-color:var(--claude);background:var(--claude-dim)}
.model-bar[data-provider=claude] .tier-btn.selected .tier-badge{background:var(--claude);color:#fff}
.model-bar[data-provider=gemini] .tier-btn.selected{border-color:var(--gemini);background:var(--gemini-dim)}
.model-bar[data-provider=gemini] .tier-btn.selected .tier-badge{background:var(--gemini);color:#fff}
.model-bar[data-provider=free] .tier-btn.selected{border-color:var(--free);background:var(--free-dim)}
.model-bar[data-provider=free] .tier-btn.selected .tier-badge{background:var(--free);color:#fff}

/* ── LAYOUT ───────────────────────── */
.shell{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;position:relative;z-index:1}
.app-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.view{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.view.active{display:flex}

/* ── CHAT ─────────────────────────── */
.chat-scroll{
  flex:1;overflow-y:auto;padding:16px;
  -webkit-overflow-scrolling:touch;overscroll-behavior:contain;
  display:flex;flex-direction:column;
}
.welcome-card{
  margin:auto 0;background:var(--surface);
  border:1px solid var(--border-2);border-radius:var(--radius);
  padding:24px 20px;text-align:center;
}
.welcome-icon{font-size:2.4rem;margin-bottom:12px;display:block}
.welcome-card h2{font-size:1.05rem;font-weight:700;margin-bottom:6px;letter-spacing:-.02em}
.welcome-card p{font-size:.83rem;color:var(--muted-2);line-height:1.55;margin-bottom:20px}
.prompt-chips{display:flex;flex-direction:column;gap:7px}
.chip{
  width:100%;padding:12px 14px;border-radius:var(--radius-sm);
  border:1px solid var(--border-2);background:var(--surface-2);
  color:var(--text);font-family:inherit;font-size:.82rem;font-weight:500;
  text-align:left;cursor:pointer;transition:all .2s;
  -webkit-tap-highlight-color:transparent;
}
.chip:active{background:var(--green-dim);border-color:rgba(74,222,128,.3)}
.chip-icon{margin-right:6px}
.msg{
  display:flex;flex-direction:column;gap:4px;
  max-width:88%;margin-bottom:12px;animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;margin-left:auto}
.msg.ai{align-self:flex-start}
.msg-meta{font-size:.62rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:0 4px}
.msg-bubble{
  padding:11px 14px;border-radius:14px;font-size:.87rem;
  line-height:1.6;white-space:pre-wrap;word-break:break-word;
}
.msg.user .msg-bubble{background:var(--green-dim);border:1px solid rgba(74,222,128,.2);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-bubble.typing::after{content:'▋';animation:blink 1s step-end infinite;color:var(--green)}
@keyframes blink{50%{opacity:0}}
.chat-compose{
  flex-shrink:0;display:flex;gap:8px;align-items:flex-end;
  padding:10px 16px calc(10px + var(--safe-b));
  border-top:1px solid var(--border);background:rgba(8,9,15,.95);
}
.chat-input{
  flex:1;min-height:48px;max-height:120px;padding:12px 14px;
  border-radius:var(--radius-sm);border:1.5px solid var(--border-2);
  background:var(--surface-2);color:var(--text);font-family:inherit;
  font-size:16px;resize:none;outline:none;transition:border-color .2s;
  -webkit-tap-highlight-color:transparent;
}
.chat-input::placeholder{color:var(--muted)}
.chat-input:focus{border-color:rgba(74,222,128,.4)}
.btn-send{
  flex-shrink:0;width:48px;height:48px;border:none;
  border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--green),#16a34a);
  color:#061008;font-size:1.1rem;cursor:pointer;
  display:grid;place-items:center;transition:all .2s;
  box-shadow:0 2px 12px rgba(74,222,128,.25);
}
.btn-send:disabled{opacity:.4;cursor:default}
.btn-send:active:not(:disabled){transform:scale(.95)}

/* ── EDITOR ───────────────────────── */
.editor-wrap{flex:1;min-height:0;display:flex;flex-direction:column;padding:12px 16px 0;gap:6px}
.editor-label{font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}
.code-editor{
  flex:1;width:100%;padding:14px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border-2);background:var(--surface);
  color:var(--code);font-family:'JetBrains Mono','Fira Code',monospace;
  font-size:.8rem;line-height:1.7;resize:none;outline:none;transition:border-color .2s;
}
.code-editor:focus{border-color:rgba(74,222,128,.3)}
.clients-panel{
  flex-shrink:0;margin:8px 16px;padding:10px 12px;
  border-radius:var(--radius-xs);background:var(--surface);
  border:1px solid var(--border);max-height:76px;overflow-y:auto;
}
.client-row{display:flex;align-items:center;gap:8px;font-size:.74rem;color:var(--muted-2);padding:3px 0}
.client-live{width:6px;height:6px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green);flex-shrink:0}
.clients-empty{font-size:.74rem;color:var(--muted);text-align:center}
.editor-actions{flex-shrink:0;padding:0 16px calc(14px + var(--safe-b));display:flex;flex-direction:column;gap:8px}
.action-row{display:flex;gap:8px}
.btn-execute{
  flex:1;min-height:52px;border:none;border-radius:var(--radius-sm);
  background:linear-gradient(135deg,var(--green),#16a34a);
  color:#061008;font-family:inherit;font-size:.95rem;font-weight:700;
  cursor:pointer;transition:all .2s;box-shadow:0 2px 16px rgba(74,222,128,.2);
  letter-spacing:-.01em;
}
.btn-execute:disabled{opacity:.4;cursor:default}
.btn-execute:active:not(:disabled){transform:scale(.98)}
.btn-ghost{
  min-height:52px;padding:0 18px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border-2);background:transparent;
  color:var(--muted-2);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s;
}
.btn-ghost:active{background:var(--surface-2)}
.status-line{font-size:.78rem;color:var(--muted);text-align:center;min-height:18px}
.status-line.ok{color:var(--green)}
.status-line.error{color:var(--danger)}

/* ── TAB BAR ──────────────────────── */
.tab-bar{
  flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;
  border-top:1px solid var(--border);background:rgba(8,9,15,.98);
  padding-bottom:var(--safe-b);
}
.tab-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  min-height:var(--tabs-h);border:none;background:transparent;
  color:var(--muted);font-family:inherit;font-size:.7rem;font-weight:600;
  cursor:pointer;transition:color .2s;-webkit-tap-highlight-color:transparent;
}
.tab-icon{font-size:1.3rem}
.tab-btn.active{color:var(--green)}

/* ── TOAST ────────────────────────── */
.toast{
  position:fixed;bottom:calc(var(--tabs-h) + var(--safe-b) + 14px);left:50%;
  transform:translateX(-50%) translateY(14px);opacity:0;pointer-events:none;
  padding:9px 18px;border-radius:999px;background:var(--surface-3);
  border:1px solid var(--border-2);font-size:.8rem;font-weight:600;
  box-shadow:var(--shadow);transition:all .25s;z-index:100;
  max-width:calc(100% - 32px);text-align:center;white-space:nowrap;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── DESKTOP ──────────────────────── */
@media(min-width:900px){
  .tab-bar{display:none}
  .shell{flex-direction:row}
  .model-bar{width:260px;border-right:1px solid var(--border);border-bottom:none;overflow-y:auto;flex-shrink:0}
  .app-body{flex-direction:row;flex:1}
  .view{display:flex!important;flex:1;min-width:0;border-right:1px solid var(--border)}
  .view:last-child{border-right:none}
  .toast{bottom:calc(24px + var(--safe-b))}
}

/* Scrollbar */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--surface-3);border-radius:2px}
</style>
</head>
<body>

<header class="header">
  <div class="brand">
    <div class="brand-icon">⚡</div>
    <div>
      <div class="brand-name">RBX Executor</div>
      <span class="brand-sub">Scripts Lua · IA</span>
    </div>
  </div>
  <div class="conn-badge" id="connBadge">
    <span class="conn-dot"></span>
    <span id="connLabel">0 online</span>
  </div>
</header>

<div class="scan-badge" id="scanBadge"></div>

<div class="shell">
  <section class="model-bar" id="modelBar" data-provider="free">
    <div class="provider-tabs">
      <button type="button" class="provider-tab claude" data-provider="claude">
        <span class="provider-dot"></span>Claude
      </button>
      <button type="button" class="provider-tab gemini" data-provider="gemini">
        <span class="provider-dot"></span>Gemini
      </button>
      <button type="button" class="provider-tab free active" data-provider="free">
        <span class="provider-dot"></span>Gratis
      </button>
    </div>
    <div class="tier-options" id="tierOptions"></div>
  </section>

  <div class="app-body">
    <section class="view view-chat active" id="viewChat">
      <div class="chat-scroll" id="chatScroll">
        <div class="welcome-card" id="welcomeCard">
          <span class="welcome-icon">🤖</span>
          <h2>¿Qué script quieres?</h2>
          <p>Con el loadstring activo la IA recibe el contexto real del juego.</p>
          <div class="prompt-chips">
            <button type="button" class="chip" data-prompt="Script de velocidad con UI mobile, botones grandes">
              <span class="chip-icon">⚡</span>Velocidad + UI móvil
            </button>
            <button type="button" class="chip" data-prompt="Script para volar con tecla F, suave y estable">
              <span class="chip-icon">🚀</span>Volar con tecla F
            </button>
            <button type="button" class="chip" data-prompt="ESP de todos los plots detectados en el mapa, con nombre y distancia, usando las rutas del contexto del juego">
              <span class="chip-icon">🗺️</span>ESP de plots/jugadores
            </button>
          </div>
        </div>
      </div>
      <div class="chat-compose">
        <textarea class="chat-input" id="chatInput" placeholder="Describe el script…" rows="1"></textarea>
        <button type="button" class="btn-send" id="btnSend" title="Enviar">▶</button>
      </div>
    </section>

    <section class="view view-editor" id="viewEditor">
      <div class="editor-wrap">
        <span class="editor-label">Código Lua</span>
        <textarea class="code-editor" id="codeArea" placeholder="-- Código Lua generado o pegado aquí" spellcheck="false"></textarea>
      </div>
      <div class="clients-panel" id="clientsPanel">
        <div class="clients-empty">Sin clientes Roblox conectados</div>
      </div>
      <div class="editor-actions">
        <div class="action-row">
          <button type="button" class="btn-execute" id="btnExecute">▶ Ejecutar en Roblox</button>
          <button type="button" class="btn-ghost" id="btnClear">Limpiar</button>
        </div>
        <p class="status-line" id="statusText">Listo</p>
      </div>
    </section>
  </div>
</div>

<nav class="tab-bar">
  <button type="button" class="tab-btn active" data-view="chat">
    <span class="tab-icon">💬</span>Chat
  </button>
  <button type="button" class="tab-btn" data-view="editor">
    <span class="tab-icon">⌨️</span>Código
  </button>
</nav>

<div class="toast" id="toast"></div>

<script>
const API = window.location.origin;
const STORAGE_KEY = 'rbx-ai-model';

const MODELS = {
  claude: [
    { id: 'claude-haiku', name: 'Haiku', desc: 'Rápido y barato', badge: 'Rápido' },
    { id: 'claude-sonnet', name: 'Sonnet', desc: 'Mejor calidad', badge: 'Pro' }
  ],
  gemini: [
    { id: 'gemini-flash', name: 'Flash', desc: 'Google AI rápido', badge: 'Flash' },
    { id: 'gemini-pro', name: 'Pro', desc: 'Más capaz', badge: 'Pro' }
  ],
  free: [
    { id: 'free-auto', name: 'Auto', desc: 'Rota keys gratis', badge: '✓ Gratis' }
  ]
};

let activeClientId = null;
let state = { provider: 'free', modelId: 'free-auto' };
let providers = { claude: true, gemini: true, free: true };

async function loadConfig() {
  try {
    const r = await fetch(API + '/api/config');
    const d = await r.json();
    if (d.providers) {
      providers = d.providers;
      document.querySelectorAll('.provider-tab').forEach(t => {
        const ok = providers[t.dataset.provider];
        t.classList.toggle('unavailable', !ok);
        t.disabled = !ok;
      });
      if (!providers[state.provider]) {
        const f = providers.free ? 'free' : providers.claude ? 'claude' : providers.gemini ? 'gemini' : null;
        if (f) setProvider(f);
      }
    }
  } catch (_) {}
}

function loadModelPref() {
  try {
    const s = localStorage.getItem(STORAGE_KEY);
    if (!s) return;
    const p = JSON.parse(s);
    if (p.provider && MODELS[p.provider]) {
      state.provider = p.provider;
      if (MODELS[p.provider].some(t => t.id === p.modelId)) state.modelId = p.modelId;
    }
  } catch (_) {}
}

function saveModelPref() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ provider: state.provider, modelId: state.modelId }));
}

function renderTiers() {
  const el = document.getElementById('tierOptions');
  el.innerHTML = MODELS[state.provider].map(t =>
    `<button type="button" class="tier-btn ${t.id === state.modelId ? 'selected' : ''}" data-model="${t.id}">
      <span class="tier-badge">${t.badge}</span>
      <span class="tier-name">${t.name}</span>
      <span class="tier-desc">${t.desc}</span>
    </button>`
  ).join('');
  el.querySelectorAll('.tier-btn').forEach(b => b.addEventListener('click', () => {
    state.modelId = b.dataset.model;
    saveModelPref();
    renderTiers();
    showToast(modelLabel() + ' seleccionado');
  }));
}

function setProvider(p) {
  state.provider = p;
  if (!MODELS[p].some(t => t.id === state.modelId)) state.modelId = MODELS[p][0].id;
  document.getElementById('modelBar').dataset.provider = p;
  document.querySelectorAll('.provider-tab').forEach(t => {
    const on = t.dataset.provider === p;
    t.classList.toggle('active', on);
    t.setAttribute('aria-pressed', String(on));
  });
  saveModelPref();
  renderTiers();
}

function modelLabel() {
  const t = MODELS[state.provider].find(x => x.id === state.modelId);
  const pn = { claude: 'Claude', gemini: 'Gemini', free: 'Gratis' };
  return t ? (pn[state.provider] || state.provider) + ' · ' + t.name : state.provider;
}

document.querySelectorAll('.provider-tab').forEach(t => t.addEventListener('click', () => {
  if (t.disabled) { showToast('Añade la API key en Railway'); return; }
  setProvider(t.dataset.provider);
}));

loadModelPref();
setProvider(state.provider);
loadConfig();

document.querySelectorAll('.tab-btn').forEach(b => b.addEventListener('click', () => {
  document.querySelectorAll('.tab-btn').forEach(x => x.classList.toggle('active', x === b));
  document.getElementById('viewChat').classList.toggle('active', b.dataset.view === 'chat');
  document.getElementById('viewEditor').classList.toggle('active', b.dataset.view === 'editor');
}));

function switchToEditor() {
  if (matchMedia('(max-width:899px)').matches) document.querySelector('.tab-btn[data-view=editor]').click();
}

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => {
  const i = document.getElementById('chatInput');
  i.value = c.dataset.prompt;
  i.dispatchEvent(new Event('input'));
  i.focus();
}));

async function pollStatus() {
  try {
    const r = await fetch(API + '/api/status');
    const d = await r.json();
    const n = d.connections || 0;
    document.getElementById('connBadge').classList.toggle('online', n > 0);
    document.getElementById('connLabel').textContent = n === 1 ? '1 online' : n + ' online';
    const sb = document.getElementById('scanBadge');
    if (d.clients?.length) {
      const best = d.clients.find(c => c.hasScan) || d.clients[0];
      activeClientId = best.id;
      const sc = best.scan;
      if (sc && sc.nodeCount > 0) {
        sb.textContent = '🗺️ Juego escaneado · ' + sc.nodeCount + ' rutas — la IA usa el contexto real';
        sb.classList.add('visible');
      } else if (best.hasScan) {
        sb.textContent = '🗺️ Mapa completo enviado a la IA';
        sb.classList.add('visible');
      } else {
        sb.classList.remove('visible');
      }
    } else {
      activeClientId = null;
      sb.classList.remove('visible');
    }
    const p = document.getElementById('clientsPanel');
    if (d.clients?.length) {
      p.innerHTML = d.clients.map(c => {
        const tag = c.scan?.plotCount ? ' · ' + c.scan.plotCount + ' plots' : '';
        return `<div class="client-row"><span class="client-live"></span><span>${esc(c.player || '?')} · ${esc(c.game || '?')}${tag}</span></div>`;
      }).join('');
    } else {
      p.innerHTML = '<div class="clients-empty">Sin clientes Roblox conectados</div>';
    }
  } catch (_) {}
}

setInterval(pollStatus, 3000);
pollStatus();

function formatError(d) {
  if (d.errorType === 'quota' || /quota|exceeded/i.test(d.error || ''))
    return d.error || 'Cuota agotada. Usa Gratis → Auto o añade más API keys.';
  if (d.incomplete || d.errorType === 'truncated')
    return d.error || 'Código incompleto. Prueba Claude → Haiku.';
  return d.error || 'Sin respuesta';
}

async function sendMessage() {
  const i = document.getElementById('chatInput'), msg = i.value.trim();
  if (!msg) return;
  if (!providers[state.provider]) { showToast('API key no configurada'); return; }
  document.getElementById('welcomeCard')?.remove();
  addMsg('user', msg);
  i.value = '';
  i.style.height = 'auto';
  const btn = document.getElementById('btnSend');
  btn.disabled = true;
  const ai = addMsg('ai', '', true);
  try {
    const r = await fetch(API + '/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, model: state.modelId, clientId: activeClientId })
    });
    const d = await r.json();
    if (d.success && d.code) {
      setBubble(ai, '✓ ' + modelLabel() + (d.via ? ' (' + d.via + ')' : '') + '\nScript listo — revisa el código.');
      document.getElementById('codeArea').value = d.code;
      setStatus('Script generado', 'ok');
      switchToEditor();
    } else {
      setBubble(ai, '⚠️ ' + formatError(d));
      if (d.partialCode) document.getElementById('codeArea').value = d.partialCode;
    }
  } catch (_) {
    setBubble(ai, 'Sin conexión al servidor');
  }
  btn.disabled = false;
}

document.getElementById('btnSend').addEventListener('click', sendMessage);
document.getElementById('chatInput').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('chatInput').addEventListener('input', function () {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

async function executeScript() {
  const code = document.getElementById('codeArea').value.trim();
  if (!code) { setStatus('Sin código', 'error'); return; }
  if (!/\bend\b/.test(code) && /\bfunction\b/.test(code)) {
    setStatus('Código incompleto — genera de nuevo', 'error');
    showToast('El script está cortado');
    return;
  }
  const btn = document.getElementById('btnExecute');
  btn.disabled = true;
  setStatus('Enviando…', '');
  try {
    const st = await fetch(API + '/api/status');
    const sd = await st.json();
    if (!(sd.connections > 0)) {
      setStatus('Sin cliente Roblox — ejecuta el loadstring', 'error');
      btn.disabled = false;
      showToast('Pega el loadstring en tu exploit');
      return;
    }
    const r = await fetch(API + '/api/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const d = await r.json();
    if (!d.success) { setStatus((d.error || 'Error').slice(0, 120), 'error'); btn.disabled = false; return; }
    let n = 0;
    const id = d.executionId;
    const t = setInterval(async () => {
      n++;
      try {
        const x = await fetch(API + '/api/result/' + id);
        const o = await x.json();
        if (o.success && o.result) {
          clearInterval(t);
          btn.disabled = false;
          if (o.result.success) {
            setStatus('Ejecutado en Roblox', 'ok');
            addMsg('ai', '✓ ' + (o.result.output || 'OK'));
          } else {
            const err = (o.result.error || 'Error desconocido').slice(0, 100);
            setStatus(err, 'error');
            addMsg('ai', '✗ ' + err);
          }
        }
      } catch (_) {}
      if (n >= 25) { clearInterval(t); btn.disabled = false; setStatus('Timeout — ¿loadstring activo?', 'error'); }
    }, 1000);
  } catch (_) { setStatus('Sin conexión', 'error'); btn.disabled = false; }
}

document.getElementById('btnExecute').addEventListener('click', executeScript);
document.getElementById('btnClear').addEventListener('click', () => {
  document.getElementById('codeArea').value = '';
  setStatus('Listo', '');
});

function addMsg(role, text, typing) {
  const s = document.getElementById('chatScroll');
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = `<span class="msg-meta">${role === 'user' ? 'Tú' : modelLabel()}</span>
    <div class="msg-bubble${typing ? ' typing' : ''}">${typing ? '' : esc(text)}</div>`;
  s.appendChild(el);
  s.scrollTop = s.scrollHeight;
  return el;
}

function setBubble(el, t) {
  const b = el.querySelector('.msg-bubble');
  b.classList.remove('typing');
  b.textContent = t;
}

function setStatus(t, type) {
  const e = document.getElementById('statusText');
  e.textContent = t;
  e.className = 'status-line' + (type ? ' ' + type : '');
}

function esc(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

let toastTimer;
function showToast(m) {
  const t = document.getElementById('toast');
  t.textContent = m;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}
</script>
