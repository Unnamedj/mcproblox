<!DOCTYPE html>
<html lang="es">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>💻 Script Inyector - Roblox</title>
   <style>
       * {
           margin: 0;
           padding: 0;
           box-sizing: border-box;
       }

       body {
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           min-height: 100vh;
           padding: 10px;
       }

       .container {
           max-width: 1200px;
           margin: 0 auto;
           display: grid;
           grid-template-columns: 1fr 1fr;
           gap: 15px;
           height: 100vh;
       }

       @media (max-width: 768px) {
           .container {
               grid-template-columns: 1fr;
               height: auto;
           }
       }

       .panel {
           background: white;
           border-radius: 15px;
           padding: 20px;
           box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
           display: flex;
           flex-direction: column;
           overflow: hidden;
       }

       .header {
           display: flex;
           align-items: center;
           gap: 10px;
           margin-bottom: 15px;
           padding-bottom: 10px;
           border-bottom: 2px solid #667eea;
       }

       .header h2 {
           font-size: 1.4em;
           color: #667eea;
           flex: 1;
       }

       .status {
           padding: 6px 12px;
           border-radius: 20px;
           font-size: 0.8em;
           font-weight: bold;
           background: #10b981;
           color: white;
       }

       .scripts-list {
           flex: 1;
           overflow-y: auto;
           margin-bottom: 10px;
           border: 1px solid #e5e7eb;
           border-radius: 10px;
           padding: 10px;
       }

       .script-item {
           padding: 12px;
           margin: 8px 0;
           background: #f3f4f6;
           border-left: 4px solid #667eea;
           border-radius: 8px;
           cursor: pointer;
           transition: all 0.3s;
           display: flex;
           justify-content: space-between;
           align-items: center;
       }

       .script-item:hover {
           background: #e5e7eb;
           transform: translateX(5px);
       }

       .script-item.active {
           background: #667eea;
           color: white;
       }

       .script-name {
           font-weight: bold;
       }

       .script-size {
           font-size: 0.8em;
           opacity: 0.7;
       }

       .button-group {
           display: flex;
           gap: 10px;
           flex-wrap: wrap;
       }

       button {
           flex: 1;
           min-width: 100px;
           padding: 12px 16px;
           border: none;
           border-radius: 8px;
           font-weight: bold;
           cursor: pointer;
           font-size: 0.95em;
           transition: all 0.3s;
       }

       .btn-primary {
           background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
           color: white;
       }

       .btn-primary:hover {
           transform: translateY(-2px);
           box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
       }

       .btn-secondary {
           background: #e5e7eb;
           color: #333;
       }

       .btn-secondary:hover {
           background: #d1d5db;
       }

       .btn-danger {
           background: #ef4444;
           color: white;
       }

       .btn-danger:hover {
           background: #dc2626;
       }

       .btn-success {
           background: #22c55e;
           color: white;
       }

       .editor-header {
           display: flex;
           gap: 10px;
           margin-bottom: 10px;
           flex-wrap: wrap;
           align-items: center;
       }

       .editor-header input,
       .editor-header textarea {
           padding: 10px;
           border: 1px solid #d1d5db;
           border-radius: 8px;
           font-size: 0.95em;
       }

       .editor-header input {
           flex: 1;
           min-width: 150px;
       }

       textarea {
           flex: 1;
           padding: 15px;
           border: 1px solid #d1d5db;
           border-radius: 8px;
           font-family: 'Monaco', 'Courier New', monospace;
           font-size: 0.95em;
           resize: none;
           line-height: 1.5;
       }

       .console {
           background: #1f2937;
           color: #10b981;
           padding: 12px;
           border-radius: 8px;
           font-family: 'Monaco', 'Courier New', monospace;
           font-size: 0.85em;
           max-height: 150px;
           overflow-y: auto;
           margin-top: 10px;
           line-height: 1.4;
       }

       .console-log {
           margin: 3px 0;
       }

       .console-error {
           color: #ef4444;
       }

       .console-success {
           color: #10b981;
       }

       .console-warn {
           color: #f59e0b;
       }

       .console-info {
           color: #3b82f6;
       }

       .stats {
           display: grid;
           grid-template-columns: 1fr 1fr;
           gap: 10px;
           margin-top: 10px;
       }

       .stat {
           background: #f3f4f6;
           padding: 10px;
           border-radius: 8px;
           text-align: center;
       }

       .stat-value {
           font-size: 1.4em;
           font-weight: bold;
           color: #667eea;
       }

       .stat-label {
           font-size: 0.8em;
           color: #6b7280;
           margin-top: 5px;
       }

       .info-panel {
           background: #f0f9ff;
           border-left: 4px solid #0ea5e9;
           padding: 12px;
           border-radius: 8px;
           margin-top: 10px;
           font-size: 0.9em;
       }

       .info-panel h4 {
           color: #0ea5e9;
           margin-bottom: 8px;
       }

       .info-panel p {
           margin: 5px 0;
           color: #64748b;
       }

       .modal {
           display: none;
           position: fixed;
           top: 0;
           left: 0;
           right: 0;
           bottom: 0;
           background: rgba(0, 0, 0, 0.5);
           z-index: 1000;
           align-items: center;
           justify-content: center;
       }

       .modal.active {
           display: flex;
       }

       .modal-content {
           background: white;
           padding: 25px;
           border-radius: 15px;
           max-width: 500px;
           width: 90%;
           box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
       }

       .modal-content h3 {
           margin-bottom: 15px;
           color: #667eea;
       }

       .modal-content input,
       .modal-content textarea {
           width: 100%;
           padding: 10px;
           margin: 10px 0;
           border: 1px solid #d1d5db;
           border-radius: 8px;
           font-size: 1em;
       }

       .modal-buttons {
           display: flex;
           gap: 10px;
           margin-top: 20px;
       }

       .modal-buttons button {
           flex: 1;
       }

       .params-label {
           font-size: 0.85em;
           color: #6b7280;
           margin-top: 5px;
       }
   </style>
</head>
<body>
   <div class="container">
       <!-- Panel Izquierdo: Scripts -->
       <div class="panel">
           <div class="header">
               <h2>📚 Mis Scripts</h2>
               <span class="status">✓ Listo</span>
           </div>

           <div class="scripts-list" id="scriptsList"></div>

           <div class="button-group">
               <button class="btn-primary" onclick="openNewScriptModal()">
                   ➕ Nuevo
               </button>
               <button class="btn-secondary" onclick="syncScripts()">
                   🔄 Sincronizar
               </button>
           </div>

           <div class="stats">
               <div class="stat">
                   <div class="stat-value" id="scriptCount">0</div>
                   <div class="stat-label">Scripts</div>
               </div>
               <div class="stat">
                   <div class="stat-value" id="totalSize">0KB</div>
                   <div class="stat-label">Total</div>
               </div>
           </div>

           <div class="info-panel">
               <h4>💡 Cómo Funciona</h4>
               <p>1. Creas script en la app</p>
               <p>2. Agregas parámetros JSON</p>
               <p>3. Presionas ⚡ Ejecutar</p>
               <p>4. Se inyecta en Roblox automático</p>
           </div>
       </div>

       <!-- Panel Derecho: Editor -->
       <div class="panel">
           <div class="header">
               <h2>✏️ Editor</h2>
           </div>

           <div class="editor-header">
               <input 
                   type="text" 
                   id="scriptName" 
                   placeholder="Nombre del script"
                   value="nuevo_script.lua"
               >
               <button class="btn-success" onclick="saveScript()" style="flex: 0;">
                   💾 Guardar
               </button>
           </div>

           <textarea 
               id="scriptCode" 
               placeholder="Código Lua aquí..."
           ></textarea>

           <!-- Parámetros -->
           <div class="editor-header" style="margin-top: 10px;">
               <textarea 
                   id="scriptParams" 
                   placeholder='Parámetros JSON: { "speed": 100, "jump": 50 }'
                   style="height: 60px; flex: 1; margin: 0;"
               ></textarea>
           </div>

           <!-- Botones de Ejecución -->
           <div class="button-group" style="margin-top: 10px;">
               <button class="btn-success" onclick="executeScript()">
                   ⚡ Ejecutar en Roblox
               </button>
               <button class="btn-danger" onclick="deleteCurrentScript()">
                   🗑️ Eliminar
               </button>
           </div>

           <!-- Consola -->
           <div class="console" id="console">
               <div class="console-log">📝 Esperando ejecución...</div>
           </div>
       </div>
   </div>

   <!-- Modal: Nuevo Script -->
   <div class="modal" id="newScriptModal">
       <div class="modal-content">
           <h3>📝 Crear Nuevo Script</h3>
           <input 
               type="text" 
               id="newScriptName" 
               placeholder="Nombre (ej: velocidad.lua)"
           >
           <select id="scriptTemplate">
               <option value="">-- Plantilla --</option>
               <option value="speed">Velocidad</option>
               <option value="jump">Salto</option>
               <option value="fly">Volar</option>
               <option value="invisible">Invisible</option>
               <option value="empty">Vacío</option>
           </select>
           <div class="modal-buttons">
               <button class="btn-primary" onclick="createNewScript()">Crear</button>
               <button class="btn-secondary" onclick="closeNewScriptModal()">Cancelar</button>
           </div>
       </div>
   </div>

   <script>
       // ========== VARIABLES GLOBALES ==========
       let scripts = {};
       let currentScript = null;
       const API_BASE = window.location.origin;

       // ========== TEMPLATES ==========
       const templates = {
           speed: `local Players = game:GetService("Players")
local player = Players:GetFirstChildOfClass("Player")

if player and player.Character then
   local humanoid = player.Character:FindFirstChild("Humanoid")
   if humanoid then
       humanoid.WalkSpeed = params.speed or 50
       print("Velocidad: " .. (params.speed or 50))
   end
end`,
           jump: `local Players = game:GetService("Players")
local player = Players:GetFirstChildOfClass("Player")

if player and player.Character then
   local humanoid = player.Character:FindFirstChild("Humanoid")
   if humanoid then
       humanoid.JumpPower = params.jump or 50
       print("Salto: " .. (params.jump or 50))
   end
end`,
           fly: `local Players = game:GetService("Players")
local player = Players:GetFirstChildOfClass("Player")

if player and player.Character then
   local rootPart = player.Character:FindFirstChild("HumanoidRootPart")
   if rootPart then
       local bodyVelocity = Instance.new("BodyVelocity")
       bodyVelocity.Parent = rootPart
       bodyVelocity.MaxForce = Vector3.new(math.huge, math.huge, math.huge)
       bodyVelocity.Velocity = Vector3.new(0, 50, 0)
       print("Volando!")
   end
end`,
           invisible: `local Players = game:GetService("Players")
local player = Players:GetFirstChildOfClass("Player")

if player and player.Character then
   for _, part in pairs(player.Character:GetDescendants()) do
       if part:IsA("BasePart") then
           part.Transparency = params.transparency or 0.5
       end
   end
   print("Invisible!")
end`,
           empty: `-- Tu código aquí`
       };

       // ========== INICIALIZACIÓN ==========
       window.addEventListener('load', () => {
           loadScripts();
       });

       // ========== GESTIÓN DE SCRIPTS ==========
       function loadScripts() {
           const saved = localStorage.getItem('allScripts');
           scripts = saved ? JSON.parse(saved) : {};
           renderScriptsList();
       }

       function saveScripts() {
           localStorage.setItem('allScripts', JSON.stringify(scripts));
           renderScriptsList();
       }

       function renderScriptsList() {
           const listEl = document.getElementById('scriptsList');
           listEl.innerHTML = '';

           let totalSize = 0;

           Object.entries(scripts).forEach(([name, code]) => {
               totalSize += new Blob([code]).size;

               const item = document.createElement('div');
               item.className = `script-item ${currentScript === name ? 'active' : ''}`;
               item.onclick = () => loadScript(name);

               const size = (new Blob([code]).size / 1024).toFixed(2);
               item.innerHTML = `
                   <div>
                       <div class="script-name">${name}</div>
                       <div class="script-size">${size} KB</div>
                   </div>
               `;
               listEl.appendChild(item);
           });

           document.getElementById('scriptCount').textContent = Object.keys(scripts).length;
           document.getElementById('totalSize').textContent = (totalSize / 1024).toFixed(1) + 'KB';
       }

       function loadScript(name) {
           currentScript = name;
           document.getElementById('scriptName').value = name;
           document.getElementById('scriptCode').value = scripts[name];
           document.getElementById('scriptParams').value = '';
           renderScriptsList();
       }

       function saveScript() {
           const name = document.getElementById('scriptName').value.trim();
           const code = document.getElementById('scriptCode').value;

           if (!name) {
               addConsoleLog('Error: Nombre vacío', 'error');
               return;
           }

           scripts[name] = code;
           currentScript = name;
           saveScripts();
           addConsoleLog(`✓ Script "${name}" guardado`, 'success');
       }

       function deleteCurrentScript() {
           if (!currentScript) {
               addConsoleLog('Error: Sin script seleccionado', 'error');
               return;
           }

           if (confirm(`¿Eliminar "${currentScript}"?`)) {
               delete scripts[currentScript];
               currentScript = null;
               saveScripts();
               document.getElementById('scriptName').value = '';
               document.getElementById('scriptCode').value = '';
               addConsoleLog('✓ Script eliminado', 'success');
           }
       }

       // ========== MODAL ==========
       function openNewScriptModal() {
           document.getElementById('newScriptModal').classList.add('active');
       }

       function closeNewScriptModal() {
           document.getElementById('newScriptModal').classList.remove('active');
       }

       function createNewScript() {
           const name = document.getElementById('newScriptName').value.trim();
           const template = document.getElementById('scriptTemplate').value;

           if (!name) {
               alert('Ingresa un nombre');
               return;
           }

           if (scripts[name]) {
               alert('Ya existe');
               return;
           }

           const code = template ? (templates[template] || templates.empty) : templates.empty;
           scripts[name] = code;
           currentScript = name;
           saveScripts();
           loadScript(name);
           closeNewScriptModal();
           addConsoleLog(`✓ Script "${name}" creado`, 'success');

           document.getElementById('newScriptName').value = '';
           document.getElementById('scriptTemplate').value = '';
       }

       // ========== EJECUCIÓN EN ROBLOX ==========
       async function executeScript() {
           const name = document.getElementById('scriptName').value;
           const code = document.getElementById('scriptCode').value;
           const paramsText = document.getElementById('scriptParams').value;

           let parameters = {};
           
           // Parsear parámetros JSON
           if (paramsText.trim()) {
               try {
                   parameters = JSON.parse(paramsText);
               } catch (e) {
                   addConsoleLog('Error: JSON inválido en parámetros', 'error');
                   return;
               }
           }

           addConsoleLog('⚡ Inyectando en Roblox...', 'warn');

           try {
               const response = await fetch(API_BASE + '/api/execute-remote', {
                   method: 'POST',
                   headers: { 'Content-Type': 'application/json' },
                   body: JSON.stringify({ 
                       scriptName: name, 
                       code: code,
                       parameters: parameters
                   })
               });

               const result = await response.json();

               if (result.success) {
                   addConsoleLog(`✓ Inyectado (ID: ${result.executionId})`, 'success');
                   addConsoleLog(`Esperando resultado...`, 'info');
                   
                   // Esperar resultado cada 2 segundos
                   let attempts = 0;
                   const checkStatus = setInterval(async () => {
                       attempts++;
                       try {
                           const statusRes = await fetch(API_BASE + `/api/execution/${result.executionId}/status`);
                           const status = await statusRes.json();
                           
                           if (status.execution.status === 'completed') {
                               clearInterval(checkStatus);
                               if (status.execution.result.success) {
                                   addConsoleLog(`✓ Ejecutado: ${status.execution.result.output}`, 'success');
                               } else {
                                   addConsoleLog(`✗ Error: ${status.execution.result.error}`, 'error');
                               }
                           }
                       } catch (e) {
                           if (attempts > 15) clearInterval(checkStatus);
                       }
                   }, 2000);
               } else {
                   addConsoleLog(`✗ ${result.error}`, 'error');
               }
           } catch (error) {
               addConsoleLog('Error de conexión al servidor', 'error');
           }
       }

       function syncScripts() {
           addConsoleLog(`🔄 ${Object.keys(scripts).length} scripts sincronizados`, 'info');
       }

       // ========== CONSOLA ==========
       function addConsoleLog(message, type = 'log') {
           const console = document.getElementById('console');
           const log = document.createElement('div');
           log.className = `console-log console-${type}`;
           log.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
           console.appendChild(log);
           console.scrollTop = console.scrollHeight;

           while (console.children.length > 50) {
               console.removeChild(console.firstChild);
           }
       }
   </script>
</body>
</html>
