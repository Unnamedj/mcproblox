<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0c10">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>RBX Executor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0a0c10;--surface:#12151c;--surface-2:#1a1f28;--border:rgba(255,255,255,.07);
  --text:#e8ecf4;--muted:#7b8499;--accent:#3dff9a;--accent-dim:rgba(61,255,154,.12);
  --claude:#d97757;--claude-dim:rgba(217,119,87,.15);--gemini:#5b8def;--gemini-dim:rgba(91,141,239,.15);
  --danger:#ff6b7a;--code:#8fd9a8;--safe-b:env(safe-area-inset-bottom,0);--safe-t:env(safe-area-inset-top,0);
  --radius:14px;--radius-sm:10px;--shadow:0 8px 32px rgba(0,0,0,.35);--tabs-h:62px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;height:100%}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;display:flex;flex-direction:column;overflow:hidden;background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(61,255,154,.08),transparent),radial-gradient(ellipse 60% 40% at 100% 100%,rgba(91,141,239,.05),transparent)}
.header{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:12px;padding:calc(12px + var(--safe-t)) 16px 12px;border-bottom:1px solid var(--border);background:rgba(18,21,28,.9);backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand-icon{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--accent),#1ed760);display:grid;place-items:center;font-size:18px;flex-shrink:0;box-shadow:0 4px 16px rgba(61,255,154,.25)}
.brand-text h1{font-size:1rem;font-weight:700;letter-spacing:-.02em}
.brand-text span{font-size:.7rem;color:var(--muted);font-weight:500}
.conn-badge{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:.72rem;font-weight:600;color:var(--muted);flex-shrink:0}
.conn-dot{width:7px;height:7px;border-radius:50%;background:var(--muted);transition:.3s}
.conn-badge.online .conn-dot{background:var(--accent);box-shadow:0 0 8px var(--accent);animation:pulse 2s ease-in-out infinite}
.conn-badge.online{color:var(--accent)}
.scan-badge{font-size:.65rem;color:var(--muted);padding:2px 10px;text-align:center;border-bottom:1px solid var(--border);background:var(--surface);display:none}
.scan-badge.visible{display:block;color:var(--accent)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.45}}
.model-bar{flex-shrink:0;padding:10px 16px 12px;border-bottom:1px solid var(--border);background:var(--surface)}
.model-bar-label{font-size:.68rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px}
.provider-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.provider-tab{display:flex;align-items:center;justify-content:center;gap:8px;min-height:44px;padding:10px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface-2);color:var(--muted);font-family:inherit;font-size:.88rem;font-weight:600;cursor:pointer;-webkit-tap-highlight-color:transparent}
.provider-tab:active:not(:disabled){transform:scale(.98)}
.provider-tab.claude.active{border-color:var(--claude);background:var(--claude-dim);color:#f0b8a4}
.provider-tab.gemini.active{border-color:var(--gemini);background:var(--gemini-dim);color:#a8c4ff}
.provider-tab.unavailable{opacity:.5;cursor:not-allowed}
.provider-dot{width:8px;height:8px;border-radius:50%}
.provider-tab.claude .provider-dot{background:var(--claude)}
.provider-tab.gemini .provider-dot{background:var(--gemini)}
.tier-options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.tier-btn{position:relative;display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-height:52px;padding:10px 12px;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;text-align:left;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tier-btn:active{transform:scale(.98)}
.tier-name{font-size:.82rem;font-weight:700}.tier-desc{font-size:.68rem;color:var(--muted)}
.tier-badge{position:absolute;top:8px;right:8px;font-size:.6rem;font-weight:700;text-transform:uppercase;padding:2px 6px;border-radius:4px}
.model-bar[data-provider=claude] .tier-btn.selected{border-color:var(--claude);background:var(--claude-dim)}
.model-bar[data-provider=claude] .tier-btn.selected .tier-badge{background:var(--claude);color:#fff}
.model-bar[data-provider=gemini] .tier-btn.selected{border-color:var(--gemini);background:var(--gemini-dim)}
.model-bar[data-provider=gemini] .tier-btn.selected .tier-badge{background:var(--gemini);color:#fff}
.shell{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.app-body{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.view{display:none;flex-direction:column;flex:1;min-height:0;overflow:hidden}
.view.active{display:flex}
.chat-scroll{flex:1;overflow-y:auto;padding:16px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.welcome-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;text-align:center;box-shadow:var(--shadow)}
.welcome-card h2{font-size:1.05rem;font-weight:700;margin-bottom:6px}
.welcome-card p{font-size:.85rem;color:var(--muted);line-height:1.5;margin-bottom:14px}
.prompt-chips{display:flex;flex-direction:column;gap:8px}
.chip{width:100%;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-family:inherit;font-size:.8rem;text-align:left;cursor:pointer}
.chip:active{background:var(--accent-dim);border-color:rgba(61,255,154,.3)}
.msg{display:flex;flex-direction:column;gap:4px;max-width:92%;margin-bottom:12px;animation:fadeIn .25s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.msg.user{align-self:flex-end;margin-left:auto}.msg.ai{align-self:flex-start}
.msg-meta{font-size:.65rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;padding:0 4px}
.msg-bubble{padding:12px 14px;border-radius:var(--radius);font-size:.88rem;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:var(--accent-dim);border:1px solid rgba(61,255,154,.25);border-bottom-right-radius:4px}
.msg.ai .msg-bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-bubble.typing::after{content:'▋';animation:blink 1s step-end infinite;color:var(--accent)}
@keyframes blink{50%{opacity:0}}
.chat-compose{flex-shrink:0;padding:12px 16px calc(12px + var(--safe-b));border-top:1px solid var(--border);background:rgba(18,21,28,.95);display:flex;gap:10px;align-items:flex-end}
.chat-input{flex:1;min-height:48px;max-height:120px;padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg);color:var(--text);font-family:inherit;font-size:16px;resize:none;outline:none}
.chat-input:focus{border-color:rgba(61,255,154,.45)}
.btn-primary{flex-shrink:0;min-width:72px;min-height:48px;padding:0 18px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#2ee87a);color:#061008;font-family:inherit;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-primary:disabled{opacity:.45}
.editor-wrap{flex:1;display:flex;flex-direction:column;min-height:0;padding:12px 16px 0}
.code-editor{flex:1;width:100%;min-height:120px;padding:14px;border-radius:var(--radius);border:1px solid var(--border);background:var(--surface);color:var(--code);font-family:'JetBrains Mono',monospace;font-size:.8rem;line-height:1.65;resize:none;outline:none}
.editor-actions{flex-shrink:0;padding:12px 16px calc(12px + var(--safe-b));display:flex;flex-direction:column;gap:10px}
.action-row{display:flex;gap:10px}
.btn-execute{flex:1;min-height:52px;border:none;border-radius:var(--radius-sm);background:linear-gradient(135deg,var(--accent),#2ee87a);color:#061008;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer}
.btn-execute:disabled{opacity:.45}
.btn-ghost{min-height:52px;padding:0 16px;border-radius:var(--radius-sm);border:1px solid var(--border);background:transparent;color:var(--muted);font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer}
.status-line{font-size:.78rem;color:var(--muted);text-align:center}
.status-line.ok{color:var(--accent)}.status-line.error{color:var(--danger)}
.clients-panel{margin:0 16px 12px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--surface);border:1px solid var(--border);max-height:88px;overflow-y:auto}
.client-row{display:flex;align-items:center;gap:8px;font-size:.75rem;color:var(--muted);padding:4px 0}
.client-row .live{width:6px;height:6px;border-radius:50%;background:var(--accent)}
.clients-empty{font-size:.75rem;color:var(--muted);text-align:center}
.tab-bar{flex-shrink:0;display:grid;grid-template-columns:1fr 1fr;border-top:1px solid var(--border);background:rgba(18,21,28,.98);padding-bottom:var(--safe-b)}
.tab-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;min-height:var(--tabs-h);border:none;background:transparent;color:var(--muted);font-family:inherit;font-size:.72rem;font-weight:600;cursor:pointer}
.tab-btn .tab-icon{font-size:1.25rem}.tab-btn.active{color:var(--accent)}
.toast{position:fixed;bottom:calc(var(--tabs-h) + var(--safe-b) + 16px);left:50%;transform:translateX(-50%) translateY(20px);opacity:0;pointer-events:none;padding:10px 18px;border-radius:999px;background:var(--surface-2);border:1px solid var(--border);font-size:.8rem;font-weight:600;box-shadow:var(--shadow);transition:.3s;z-index:100;max-width:calc(100% - 32px);text-align:center}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@media(min-width:900px){.tab-bar{display:none}.shell{flex-direction:row}.model-bar{width:280px;border-right:1px solid var(--border);border-bottom:none;overflow-y:auto}.app-body{flex-direction:row;flex:1}.view{display:flex!important;flex:1;min-width:0;border-right:1px solid var(--border)}.view:last-child{border-right:none}.toast{bottom:calc(24px + var(--safe-b))}}
</style>
</head>
<body>
<header class="header">
  <div class="brand"><div class="brand-icon">⚡</div><div class="brand-text"><h1>RBX Executor</h1><span>Scripts Lua · Claude & Gemini</span></div></div>
  <div class="conn-badge" id="connBadge"><span class="conn-dot"></span><span id="connLabel">0 online</span></div>
</header>
<div class="scan-badge" id="scanBadge"></div>
<div class="shell">
  <section class="model-bar" id="modelBar" data-provider="claude">
    <div class="model-bar-label">Modelo de IA</div>
    <div class="provider-tabs">
      <button type="button" class="provider-tab claude active" data-provider="claude"><span class="provider-dot"></span>Claude</button>
      <button type="button" class="provider-tab gemini" data-provider="gemini"><span class="provider-dot"></span>Gemini</button>
    </div>
    <div class="tier-options" id="tierOptions"></div>
  </section>
  <div class="app-body">
    <section class="view view-chat active" id="viewChat">
      <div class="chat-scroll" id="chatScroll">
        <div class="welcome-card" id="welcomeCard">
          <h2>¿Qué script quieres?</h2>
          <p>Con el loadstring activo, escaneamos TODO el juego (Workspace, ReplicatedStorage, UI…).</p>
          <div class="prompt-chips">
            <button type="button" class="chip" data-prompt="Script de velocidad con UI mobile, botones grandes">Velocidad + UI mobile</button>
            <button type="button" class="chip" data-prompt="Script para volar con tecla F, suave y estable">Volar con tecla F</button>
            <button type="button" class="chip" data-prompt="ESP de todos los plots detectados en el mapa, con nombre y distancia, usando las rutas del contexto del juego">ESP de jugadores</button>
          </div>
        </div>
      </div>
      <div class="chat-compose">
        <textarea class="chat-input" id="chatInput" placeholder="Describe el script..." rows="1"></textarea>
        <button type="button" class="btn-primary" id="btnSend">Crear</button>
      </div>
    </section>
    <section class="view view-editor" id="viewEditor">
      <div class="editor-wrap"><textarea class="code-editor" id="codeArea" placeholder="-- Código Lua generado o pegado aquí" spellcheck="false"></textarea></div>
      <div class="clients-panel" id="clientsPanel"><div class="clients-empty">Sin clientes Roblox conectados</div></div>
      <div class="editor-actions">
        <div class="action-row"><button type="button" class="btn-execute" id="btnExecute">Ejecutar en Roblox</button><button type="button" class="btn-ghost" id="btnClear">Limpiar</button></div>
        <p class="status-line" id="statusText">Listo</p>
      </div>
    </section>
  </div>
</div>
<nav class="tab-bar"><button type="button" class="tab-btn active" data-view="chat"><span class="tab-icon">💬</span>Chat</button><button type="button" class="tab-btn" data-view="editor"><span class="tab-icon">⌨️</span>Código</button></nav>
<div class="toast" id="toast"></div>
<script>
const API=window.location.origin,STORAGE_KEY='rbx-ai-model';
const MODELS={claude:[{id:'claude-haiku',name:'Haiku',desc:'Más barato',badge:'Económico'},{id:'claude-sonnet',name:'Sonnet',desc:'Mejor calidad',badge:'Pro'}],gemini:[{id:'gemini-flash',name:'Flash',desc:'Gratis con límites',badge:'Flash'},{id:'gemini-pro',name:'Pro',desc:'Más capaz',badge:'Pro'}]};
let activeClientId=null;
let state={provider:'claude',modelId:'claude-haiku'},providers={claude:true,gemini:true};
async function loadConfig(){try{const r=await fetch(API+'/api/config');const d=await r.json();if(d.providers){providers=d.providers;document.querySelectorAll('.provider-tab').forEach(t=>{const ok=providers[t.dataset.provider];t.classList.toggle('unavailable',!ok);t.disabled=!ok});if(!providers[state.provider]){const f=providers.claude?'claude':providers.gemini?'gemini':null;if(f)setProvider(f)}}}catch(_){}}
function loadModelPref(){try{const s=localStorage.getItem(STORAGE_KEY);if(!s)return;const p=JSON.parse(s);if(p.provider&&MODELS[p.provider]){state.provider=p.provider;if(MODELS[p.provider].some(t=>t.id===p.modelId))state.modelId=p.modelId}}catch(_){}}
function saveModelPref(){localStorage.setItem(STORAGE_KEY,JSON.stringify({provider:state.provider,modelId:state.modelId}))}
function renderTiers(){const el=document.getElementById('tierOptions');el.innerHTML=MODELS[state.provider].map(t=>'<button type="button" class="tier-btn '+(t.id===state.modelId?'selected':'')+'" data-model="'+t.id+'"><span class="tier-badge">'+t.badge+'</span><span class="tier-name">'+t.name+'</span><span class="tier-desc">'+t.desc+'</span></button>').join('');el.querySelectorAll('.tier-btn').forEach(b=>b.addEventListener('click',()=>{state.modelId=b.dataset.model;saveModelPref();renderTiers();showToast(modelLabel())}))}
function setProvider(p){state.provider=p;if(!MODELS[p].some(t=>t.id===state.modelId))state.modelId=MODELS[p][0].id;document.getElementById('modelBar').dataset.provider=p;document.querySelectorAll('.provider-tab').forEach(t=>{const on=t.dataset.provider===p;t.classList.toggle('active',on);t.setAttribute('aria-pressed',on)});saveModelPref();renderTiers()}
function modelLabel(){const t=MODELS[state.provider].find(x=>x.id===state.modelId);return t?(state.provider==='claude'?'Claude':'Gemini')+' · '+t.name:state.provider}
document.querySelectorAll('.provider-tab').forEach(t=>t.addEventListener('click',()=>{if(t.disabled){showToast('Añade la API key en Railway');return}setProvider(t.dataset.provider)}));
loadModelPref();setProvider(state.provider);loadConfig();
document.querySelectorAll('.tab-btn').forEach(b=>b.addEventListener('click',()=>{document.querySelectorAll('.tab-btn').forEach(x=>x.classList.toggle('active',x===b));document.getElementById('viewChat').classList.toggle('active',b.dataset.view==='chat');document.getElementById('viewEditor').classList.toggle('active',b.dataset.view==='editor')}));
function switchToEditor(){if(matchMedia('(max-width:899px)').matches)document.querySelector('.tab-btn[data-view=editor]').click()}
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>{const i=document.getElementById('chatInput');i.value=c.dataset.prompt;i.dispatchEvent(new Event('input'));i.focus()}));
async function pollStatus(){try{const r=await fetch(API+'/api/status');const d=await r.json();const n=d.connections||0;document.getElementById('connBadge').classList.toggle('online',n>0);document.getElementById('connLabel').textContent=n===1?'1 online':n+' online';const sb=document.getElementById('scanBadge');if(d.clients?.length){const best=d.clients.find(c=>c.hasScan)||d.clients[0];activeClientId=best.id;const sc=best.scan;if(sc&&sc.plotCount>0){sb.textContent='🗺️ Juego escaneado: '+(sc.nodeCount||sc.plotCount||0)+' rutas · la IA ve todo el contexto';sb.classList.add('visible')}else if(best.hasScan){sb.textContent='🗺️ Mapa completo enviado a la IA';sb.classList.add('visible')}else{sb.textContent='Conecta el loadstring para escanear el juego';sb.classList.remove('visible')}}else{activeClientId=null;sb.classList.remove('visible')}const p=document.getElementById('clientsPanel');if(d.clients?.length)p.innerHTML=d.clients.map(c=>{const tag=c.scan&&c.scan.plotCount?' · '+c.scan.plotCount+' plots':'';return'<div class="client-row"><span class="live"></span><span>'+esc(c.player||'?')+' · '+esc(c.game||'?')+tag+'</span></div>'}).join('');else p.innerHTML='<div class="clients-empty">Sin clientes Roblox conectados</div>'}catch(_){}}
setInterval(pollStatus,3000);pollStatus();
function formatError(d){if(d.errorType==='quota'||/quota|exceeded/i.test(d.error||''))return d.error||'Cuota Gemini agotada. Usa Claude → Haiku o espera 1 min.';return d.error||'Sin respuesta'}
async function sendMessage(){const i=document.getElementById('chatInput'),msg=i.value.trim();if(!msg)return;if(!providers[state.provider]){showToast('API key no configurada');return}document.getElementById('welcomeCard')?.remove();addMsg('user',msg);i.value='';i.style.height='auto';const btn=document.getElementById('btnSend');btn.disabled=true;const ai=addMsg('ai','',true);try{const r=await fetch(API+'/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg,model:state.modelId,clientId:activeClientId})});const d=await r.json();if(d.success&&d.code){setBubble(ai,'✓ '+modelLabel()+'. Revisa el código.');document.getElementById('codeArea').value=d.code;setStatus('Script generado','ok');switchToEditor()}else setBubble(ai,'⚠️ '+formatError(d))}catch(_){setBubble(ai,'Sin conexión al servidor')}btn.disabled=false}
document.getElementById('btnSend').addEventListener('click',sendMessage);
document.getElementById('chatInput').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'});
document.getElementById('chatInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}});
async function executeScript(){const code=document.getElementById('codeArea').value.trim();if(!code){setStatus('Sin código','error');return}const btn=document.getElementById('btnExecute');btn.disabled=true;setStatus('Enviando…','');try{const r=await fetch(API+'/api/execute',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});const d=await r.json();if(!d.success){setStatus(d.error||'Error','error');btn.disabled=false;return}let n=0;const id=d.executionId,t=setInterval(async()=>{n++;try{const x=await fetch(API+'/api/result/'+id);const o=await x.json();if(o.success&&o.result){clearInterval(t);btn.disabled=false;if(o.result.success){setStatus('Ejecutado','ok');addMsg('ai','✓ '+(o.result.output||''))}else{setStatus('Error Roblox','error');addMsg('ai','✗ '+(o.result.error||''))}}}catch(_){}if(n>=20){clearInterval(t);btn.disabled=false;setStatus('Timeout','error')}},1000)}catch(_){setStatus('Sin conexión','error');btn.disabled=false}}
document.getElementById('btnExecute').addEventListener('click',executeScript);
document.getElementById('btnClear').addEventListener('click',()=>{document.getElementById('codeArea').value='';setStatus('Listo','')});
function addMsg(role,text,typing){const s=document.getElementById('chatScroll'),el=document.createElement('div');el.className='msg '+role;el.innerHTML='<span class="msg-meta">'+(role==='user'?'Tú':modelLabel())+'</span><div class="msg-bubble'+(typing?' typing':'')+'">'+(typing?'':esc(text))+'</div>';s.appendChild(el);s.scrollTop=s.scrollHeight;return el}
function setBubble(el,t){const b=el.querySelector('.msg-bubble');b.classList.remove('typing');b.textContent=t}
function setStatus(t,type){const e=document.getElementById('statusText');e.textContent=t;e.className='status-line'+(type?' '+type:'')}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
let toastTimer;function showToast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}
</script>
</body>
</html>
