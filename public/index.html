<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RBX Executor</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --panel: #0d1117;
  --border: #1e2730;
  --accent: #00ff87;
  --red: #ff4757;
  --text: #cdd6f4;
  --muted: #6b7280;
  --glow: 0 0 20px rgba(0,255,135,0.3);
}
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'JetBrains Mono', monospace;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  background: var(--panel);
}
.logo {
  font-family: 'Syne', sans-serif;
  font-size: 1.2em;
  font-weight: 800;
  color: var(--accent);
}
.logo span { color: var(--text); }
.connections {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8em;
}
.dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: var(--muted);
  transition: all 0.3s;
  flex-shrink: 0;
}
.dot.active {
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent);
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%,100% { opacity:1; } 50% { opacity:0.4; }
}
.main {
  display: flex;
  flex: 1;
  overflow: hidden;
}
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .panel-left, .panel-right { width:100%; max-height:50vh; }
}
.panel-left {
  width: 45%;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
}
.panel-right {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.panel-header {
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
  font-size: 0.72em;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 1px;
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--panel);
}
.tag {
  background: var(--accent);
  color: var(--bg);
  padding: 2px 6px;
  border-radius: 3px;
  font-size: 0.85em;
  font-weight: 700;
}
.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.chat-messages::-webkit-scrollbar { width: 3px; }
.chat-messages::-webkit-scrollbar-thumb { background: var(--border); }
.msg { display:flex; flex-direction:column; gap:4px; max-width:90%; }
.msg.user { align-self:flex-end; align-items:flex-end; }
.msg.ai { align-self:flex-start; align-items:flex-start; }
.msg-label { font-size:0.68em; color:var(--muted); text-transform:uppercase; letter-spacing:0.5px; }
.msg-bubble {
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 0.82em;
  line-height: 1.6;
  white-space: pre-wrap;
  word-break: break-word;
}
.msg.user .msg-bubble {
  background: rgba(0,255,135,0.08);
  border: 1px solid rgba(0,255,135,0.2);
}
.msg.ai .msg-bubble {
  background: var(--panel);
  border: 1px solid var(--border);
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
.typing::after { content:'▋'; animation: blink 1s infinite; }
.chat-input-area {
  padding: 12px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: flex-end;
  background: var(--panel);
}
.chat-input {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  padding: 10px 14px;
  resize: none;
  min-height: 42px;
  max-height: 120px;
  outline: none;
  transition: border 0.2s;
}
.chat-input:focus { border-color: var(--accent); }
.chat-input::placeholder { color: var(--muted); }
.btn-send {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 10px 18px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 0.9em;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn-send:hover { box-shadow: var(--glow); }
.btn-send:disabled { opacity:0.4; cursor:not-allowed; }
.code-area {
  flex: 1;
  background: var(--bg);
  border: none;
  color: #a6e3a1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.83em;
  padding: 16px;
  resize: none;
  outline: none;
  line-height: 1.6;
}
.code-area::placeholder { color: var(--muted); }
.execute-bar {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  align-items: center;
  background: var(--panel);
}
.btn-execute {
  background: var(--accent);
  color: var(--bg);
  border: none;
  border-radius: 8px;
  padding: 13px 28px;
  font-family: 'Syne', sans-serif;
  font-weight: 800;
  font-size: 1em;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.5px;
}
.btn-execute:hover { transform:translateY(-1px); box-shadow:var(--glow); }
.btn-execute:active { transform:translateY(0); }
.btn-execute:disabled { opacity:0.4; cursor:not-allowed; transform:none; box-shadow:none; }
.btn-clear {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 13px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.82em;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-clear:hover { border-color:var(--red); color:var(--red); }
.status-text { flex:1; font-size:0.75em; color:var(--muted); text-align:right; }
.status-text.ok { color:var(--accent); }
.status-text.error { color:var(--red); }
.clients-list {
  padding: 10px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 90px;
  overflow-y: auto;
  background: var(--panel);
}
.client-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.73em;
  color: var(--muted);
}
.client-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 5px var(--accent);
  flex-shrink: 0;
}
.welcome {
  text-align: center;
  color: var(--muted);
  font-size: 0.8em;
  padding: 24px 16px;
  line-height: 2;
}
.welcome strong { color: var(--accent); }
.welcome em { color: var(--text); opacity: 0.7; }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">RBX<span>Executor</span></div>
  <div class="connections">
    <div class="dot" id="dot"></div>
    <span id="connLabel" style="color:var(--muted)">0 conectados</span>
  </div>
</div>

<div class="main">

  <div class="panel-left">
    <div class="panel-header">
      Chat IA <span class="tag">Claude</span>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="welcome">
        <strong>Hola.</strong><br>
        Dime qué script quieres y lo creo.<br><br>
        <em>"Script de velocidad con UI mobile"</em><br>
        <em>"Haz que pueda volar"</em><br>
        <em>"ESP de jugadores"</em>
      </div>
    </div>

    <div class="chat-input-area">
      <textarea
        class="chat-input"
        id="chatInput"
        placeholder="Describe el script..."
        rows="1"
      ></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()">Crear</button>
    </div>
  </div>

  <div class="panel-right">
    <div class="panel-header">Editor</div>

    <textarea
      class="code-area"
      id="codeArea"
      placeholder="-- El script generado aparece aquí
-- También puedes escribir directamente"
    ></textarea>

    <div class="execute-bar">
      <button class="btn-execute" id="btnExecute" onclick="executeScript()">⚡ EXECUTE</button>
      <button class="btn-clear" onclick="clearCode()">Limpiar</button>
      <span class="status-text" id="statusText">Listo</span>
    </div>

    <div class="clients-list" id="clientsList">
      <div class="client-item">
        <span>Sin conexiones activas</span>
      </div>
    </div>
  </div>

</div>

<script>
const API = 'https://mcproblox-production.up.railway.app';
let currentExecId = null;

// ── POLLING STATUS ─────────────────────────────────────
async function pollStatus() {
  try {
    const res = await fetch(API + '/api/status');
    const data = await res.json();
    const count = data.connections || 0;

    const dot = document.getElementById('dot');
    const label = document.getElementById('connLabel');

    if (count > 0) {
      dot.classList.add('active');
      label.textContent = count + (count === 1 ? ' conectado' : ' conectados');
      label.style.color = 'var(--accent)';
    } else {
      dot.classList.remove('active');
      label.textContent = '0 conectados';
      label.style.color = 'var(--muted)';
    }

    const list = document.getElementById('clientsList');
    if (data.clients && data.clients.length > 0) {
      list.innerHTML = data.clients.map(c => `
        <div class="client-item">
          <div class="client-dot"></div>
          <span>${c.player || 'Unknown'} · ${c.game || 'Unknown'}</span>
        </div>
      `).join('');
    } else {
      list.innerHTML = '<div class="client-item"><span>Sin conexiones activas</span></div>';
    }
  } catch(e) {}
}

setInterval(pollStatus, 3000);
pollStatus();

// ── CLAUDE ─────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;

  addMsg('user', msg);
  input.value = '';
  input.style.height = 'auto';

  const btnSend = document.getElementById('btnSend');
  btnSend.disabled = true;

  const aiEl = addMsg('ai', '', true);

  try {
    const res = await fetch(API + '/api/ai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });

    const data = await res.json();

    if (data.success && data.code) {
      aiEl.querySelector('.msg-bubble').textContent = '✓ Script creado. Revísalo y presiona EXECUTE.';
      aiEl.querySelector('.msg-bubble').classList.remove('typing');
      document.getElementById('codeArea').value = data.code;
      setStatus('Script listo.', '');
    } else {
      aiEl.querySelector('.msg-bubble').textContent = 'Error: ' + (data.error || 'Sin respuesta');
      aiEl.querySelector('.msg-bubble').classList.remove('typing');
    }
  } catch(e) {
    aiEl.querySelector('.msg-bubble').textContent = 'Error de conexión.';
    aiEl.querySelector('.msg-bubble').classList.remove('typing');
  }

  btnSend.disabled = false;
}

// ── EXECUTE ────────────────────────────────────────────
async function executeScript() {
  const code = document.getElementById('codeArea').value.trim();
  if (!code) { setStatus('No hay código.', 'error'); return; }

  const btn = document.getElementById('btnExecute');
  btn.disabled = true;
  setStatus('Enviando a Roblox...', '');

  try {
    const res = await fetch(API + '/api/execute', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });

    const data = await res.json();

    if (data.success) {
      currentExecId = data.executionId;
      setStatus('Esperando resultado...', '');

      let attempts = 0;
      const check = setInterval(async () => {
        attempts++;
        try {
          const r = await fetch(API + '/api/result/' + currentExecId);
          const d = await r.json();
          if (d.success && d.result) {
            clearInterval(check);
            btn.disabled = false;
            currentExecId = null;
            if (d.result.success) {
              setStatus('✓ Ejecutado en Roblox', 'ok');
              addMsg('ai', '✓ Ejecutado correctamente.\n' + (d.result.output || ''));
            } else {
              setStatus('✗ Error en Roblox', 'error');
              addMsg('ai', '✗ Error: ' + (d.result.error || 'desconocido'));
            }
          }
        } catch(e) {}
        if (attempts >= 15) {
          clearInterval(check);
          btn.disabled = false;
          setStatus('Timeout. ¿Está el loadstring activo?', 'error');
        }
      }, 1000);
    } else {
      setStatus('Error: ' + data.error, 'error');
      btn.disabled = false;
    }
  } catch(e) {
    setStatus('Error de conexión.', 'error');
    btn.disabled = false;
  }
}

// ── HELPERS ────────────────────────────────────────────
function addMsg(role, text, typing = false) {
  const container = document.getElementById('chatMessages');
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const el = document.createElement('div');
  el.className = 'msg ' + role;
  el.innerHTML = `
    <div class="msg-label">${role === 'user' ? 'Tú' : 'IA'}</div>
    <div class="msg-bubble ${typing ? 'typing' : ''}">${text}</div>
  `;
  container.appendChild(el);
  container.scrollTop = container.scrollHeight;
  return el;
}

function setStatus(text, type) {
  const el = document.getElementById('statusText');
  el.textContent = text;
  el.className = 'status-text' + (type ? ' ' + type : '');
}

function clearCode() {
  document.getElementById('codeArea').value = '';
  setStatus('Listo', '');
}

document.getElementById('chatInput').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

document.getElementById('chatInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});
</script>
</body>
</html>
